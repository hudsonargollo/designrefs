name: Sync downstream repos

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to simulate (e.g. v0.12.0)"
        required: true
        default: "v0.12.0"

jobs:
  sync-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout designrefs-skills
        uses: actions/checkout@v4
        with:
          repository: hudsonargollo/designrefs-skills
          token: ${{ secrets.SKILLS_REPO_PAT }}
          path: designrefs-skills

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Bump skills version and update SKILL.md
        env:
          DESIGNREFS_VERSION: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          cd designrefs-skills
          VERSION="${DESIGNREFS_VERSION#v}"
          npm version patch --no-git-tag-version
          find skills -name "SKILL.md" -exec \
            sed -i "s/designrefs@[0-9][0-9.]*/designrefs@${VERSION}/g" {} \;

      - name: Create PR in designrefs-skills
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SKILLS_REPO_PAT }}
          path: designrefs-skills
          commit-message: "chore: sync with designrefs ${{ github.event.release.tag_name || github.event.inputs.tag }}"
          branch: "sync/designrefs-${{ github.event.release.tag_name || github.event.inputs.tag }}"
          title: "chore: sync with designrefs ${{ github.event.release.tag_name || github.event.inputs.tag }}"
          body: |
            Automated sync triggered by [designrefs ${{ github.event.release.tag_name || github.event.inputs.tag }}](${{ github.event.release.html_url || 'manual trigger' }}).

            - Bumped `designrefs-skills` patch version
            - Updated CLI version references in skill files

            **⚠ Manual check required before merging**
            This automation only updates version numbers. If this release added or changed CLI flags, update `skills/extract-design/SKILL.md` manually:
            - Flags reference table
            - Anti-Bot section if behavior changed

            See full checklist: [designrefs/CLAUDE.md](https://github.com/hudsonargollo/designrefs/blob/main/CLAUDE.md)
          labels: automated

  sync-next:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout designrefs-next
        uses: actions/checkout@v4
        with:
          repository: hudsonargollo/designrefs-next
          token: ${{ secrets.NEXT_REPO_PAT }}
          path: designrefs-next

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update designrefs version references
        env:
          DESIGNREFS_VERSION: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          cd designrefs-next
          VERSION="${DESIGNREFS_VERSION#v}"
          npm pkg set dependencies.designrefs="${VERSION}"
          # Keep package-lock.json in sync with package.json. Without this the
          # lock still pins the old version and `npm ci` (CI, the drift gate)
          # fails before anyone can run `npm install`.
          npm install --package-lock-only
          # schema.org softwareVersion always tracks the CLI version (deterministic)
          sed -i "s/\"softwareVersion\": \"[0-9][0-9.]*\"/\"softwareVersion\": \"${VERSION}\"/" app/layout.tsx

      - name: Create PR in designrefs-next
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.NEXT_REPO_PAT }}
          path: designrefs-next
          commit-message: "chore: bump designrefs to ${{ github.event.release.tag_name || github.event.inputs.tag }}"
          branch: "sync/designrefs-${{ github.event.release.tag_name || github.event.inputs.tag }}"
          title: "chore: bump designrefs to ${{ github.event.release.tag_name || github.event.inputs.tag }}"
          body: |
            Automated bump triggered by [designrefs ${{ github.event.release.tag_name || github.event.inputs.tag }}](${{ github.event.release.html_url || 'manual trigger' }}).

            Updates `designrefs` npm dependency to latest release (package.json + package-lock.json) and bumps `app/layout.tsx` schema.org `softwareVersion`.

            **⚠ Manual check required before merging**
            This automation bumps the npm version in `package.json` and the schema.org `softwareVersion`. If this release added or changed CLI flags, update these manually before merging:
            - `app/getting-started/page.tsx` — flags list
            - `app/blackpaper/page.tsx` — flags list
            - `app/page.tsx` — landing page flags (`new: true` for new ones)
            - `lib/app/extract-types.ts` — `ExtractionMeta` if JSON output shape changed
            - `app/api/extractions/route.ts` — if field access needs updating

            See full checklist: [designrefs/CLAUDE.md](https://github.com/hudsonargollo/designrefs/blob/main/CLAUDE.md)
          labels: automated
